# Peach Basket — production CI
# Runs on every push and pull request to main. Does not deploy.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prisma generate + Next build do not need a live database, but env vars must exist.
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/peach_basket_ci?schema=public
  DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/peach_basket_ci?schema=public
  PORTAL_SESSION_SECRET: ci-portal-session-secret-do-not-use-in-production
  CRON_SECRET: ci-cron-secret-do-not-use-in-production
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'prisma/**', 'next.config.mjs', 'tsconfig.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Production build
        run: npm run build
